<div class="flex flex-1 flex-row gap-4">
    <mat-tree #tree [dataSource]="treeData()" [childrenAccessor]="childrenAccessor" class="min-w-72 h-[75vh] overflow-auto">
        <mat-nested-tree-node *matTreeNodeDef="let node">
            <button class="flex items-center gap-2 cursor-pointer hover:bg-(--mat-sys-secondary-container) transition-colors duration-200 rounded-lg w-full px-10 my-1">
                <mat-icon fontSet="">pageview</mat-icon>
                {{node.name}}
            </button>
        </mat-nested-tree-node>
        <mat-nested-tree-node *matTreeNodeDef="let node; when: hasChild" matTreeNodeToggle [cdkTreeNodeTypeaheadLabel]="node.name">
            <div class="flex items-center gap-2 hover:cursor-pointer">
                <button matIconButton matTreeNodeToggle [attr.aria-label]="'Toggle ' + node.name">
                    <mat-icon fontSet="material-icons-outlined">{{ tree.isExpanded(node) ? 'folder_open' : 'folder' }}</mat-icon>
                </button>
                {{ node.name }}
            </div>
            <div class="ml-6 overflow-hidden transition-all duration-100 ease-linear" [class.overflow-hidden]="!tree.isExpanded(node)" [class.max-h-0]="!tree.isExpanded(node)" [class.max-h-96!]="tree.isExpanded(node)" role="group">
                <ng-container matTreeNodeOutlet></ng-container>
            </div>
        </mat-nested-tree-node>
    </mat-tree>
    <mat-divider [vertical]="true"></mat-divider>
</div>
<div class="my-10 flex flex-1 flex-row items-center justify-center gap-6">
        <button matButton="filled" class="w-36">Save</button>
        <button matButton="tonal" class="w-36">Export</button>
        <button matButton="tonal" class="w-36">Reset</button>
        <button matButton="tonal" class="w-36">Back</button>
</div>
