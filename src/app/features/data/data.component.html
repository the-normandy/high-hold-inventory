<div class="flex flex-1 flex-row gap-4">
    <mat-tree #tree [dataSource]="treeData()" [childrenAccessor]="childrenAccessor" class="min-w-72 h-[75vh] overflow-auto">
        <mat-nested-tree-node *matTreeNodeDef="let node">
            <button (click)="select(node)" [class.active]="isSelected(node)" class="flex items-center gap-2 cursor-pointer hover:bg-(--mat-sys-secondary-container) transition-colors duration-200 rounded-lg w-full px-10 my-1">
                <mat-icon>pageview</mat-icon>
                {{node.name}}
            </button>
        </mat-nested-tree-node>
        <mat-nested-tree-node *matTreeNodeDef="let node; when: hasChild" [cdkTreeNodeTypeaheadLabel]="node.name">
            <div class="flex gap-2">
                <button matTreeNodeToggle [attr.aria-label]="'Toggle ' + node.name" class="inline-flex hover:cursor-pointer hover:bg-(--mat-sys-secondary-container) transition-colors duration-200 rounded-lg w-full items-center gap-2 px-2">
                    <mat-icon>{{ tree.isExpanded(node) ? 'folder_open' : 'folder' }}</mat-icon>
                    {{ node.name }}
                </button>
            </div>
            <div class="ml-6 overflow-hidden transition-all duration-100 ease-linear" [class.overflow-hidden]="!tree.isExpanded(node)" [class.max-h-0]="!tree.isExpanded(node)" [class.max-h-96!]="tree.isExpanded(node)" role="group">
                <ng-container matTreeNodeOutlet></ng-container>
            </div>
        </mat-nested-tree-node>
    </mat-tree>
    <mat-divider [vertical]="true"></mat-divider>
    <form [formGroup]="form" class="flex flex-1 flex-col items-center">
        <div formArrayName="items">
            <h2 class="text-2xl text-center pb-10">Category: {{this.selected().at(-1)}}</h2>
            @for (group of items.controls; track group) {
                <div [formGroupName]="$index" class="flex flex-row items-center justify-center gap-10">
                    <mat-form-field>
                        <mat-label>Name</mat-label>
                        <input matInput formControlName="name">
                    </mat-form-field>
                    <mat-form-field>
                        <mat-label>Price</mat-label>
                        <input matInput type="number" formControlName="price">
                    </mat-form-field>
                    @if (group.get('labor')) {
                    <mat-form-field>
                        <mat-label>Labor</mat-label>
                        <input matInput type="number" formControlName="labor">
                    </mat-form-field>
                    }
                </div>
            }
        </div>
    </form>
</div>
<div class="my-10 flex flex-1 flex-row items-center justify-center gap-6">
        <button matButton="filled" class="w-36">Save</button>
        <button matButton="tonal" class="w-36">Export</button>
        <button matButton="tonal" class="w-36">Reset</button>
        <button matButton="tonal" class="w-36" routerLink="">Back</button>
</div>
