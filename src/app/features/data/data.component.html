<div class="flex flex-1 flex-row">
    <mat-tree #tree [dataSource]="treeData()" [childrenAccessor]="childrenAccessor">
        <mat-nested-tree-node *matTreeNodeDef="let node">
            <div class="flex items-center gap-2">
                <mat-icon fontSet="">description</mat-icon>
                {{node.name}}
            </div>
        </mat-nested-tree-node>
        <mat-nested-tree-node *matTreeNodeDef="let node; when: hasChild" matTreeNodeToggle [cdkTreeNodeTypeaheadLabel]="node.name">
            <div class="flex items-center gap-2 hover:cursor-pointer">
                <button matIconButton matTreeNodeToggle [attr.aria-label]="'Toggle ' + node.name">
                    <mat-icon fontSet="material-icons-outlined">{{ tree.isExpanded(node) ? 'folder_open' : 'folder' }}</mat-icon>
                </button>
                {{ node.name }}
            </div>
            <div class="ml-6" [class.hidden]="!tree.isExpanded(node)" role="group">
                <ng-container matTreeNodeOutlet></ng-container>
            </div>
        </mat-nested-tree-node>
    </mat-tree>
</div>
