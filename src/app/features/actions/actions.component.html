<div class="flex flex-1 flex-col gap-10 items-center justify-center">
    <h1 class="text-3xl">Log Generation</h1>
    <div class="flex flex-row gap-10 items-center justify-center">
        <mat-card class="p-4 w-sm">
            <mat-card-header class="text-2xl">Deposit</mat-card-header>
            <mat-card-content class="py-8!">
                <span>Logs for depositing materials, crafted items or silver.</span>
            </mat-card-content>
            <mat-card-actions class="gap-4 items-center justify-center">
                <a matButton="filled" routerLink="/new/deposit">Prepare Form</a>
            </mat-card-actions>
        </mat-card>
        <mat-card class="p-4 w-sm">
            <mat-card-header class="text-2xl">Withdraw</mat-card-header>
            <mat-card-content class="py-8!">Logs for withdrawing materials or crafted items.</mat-card-content>
            <mat-card-actions class="gap-4 items-center justify-center">
                <a matButton="filled" routerLink="/new/withdraw">Prepare Form</a>
            </mat-card-actions>
        </mat-card>
    </div>
    <button matButton="tonal" class="px-24!" routerLink="">Back</button>
</div>
