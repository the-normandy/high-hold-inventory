<h2 mat-dialog-title>Confirm deletion</h2>
<mat-dialog-content class="py-2!">
    <span>Are you sure you want to delete this record? This action cannot be reversed.</span>
</mat-dialog-content>
<mat-dialog-actions align="end">
    <button matButton="filled" class="w-24" [mat-dialog-close]="true">Confirm</button>
    <button matButton="tonal" class="w-24" [mat-dialog-close]="false">Cancel</button>
</mat-dialog-actions>
