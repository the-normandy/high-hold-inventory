<div class="grid grid-cols-3 gap-10">
    <mat-card>
        <mat-card-header class="text-xl">Balance</mat-card-header>
        <mat-card-content>
            <div class="flex flex-col gap-2">
                <span class="text-4xl self-center justify-self-center pt-4 pb-8" [class.text-green-500]="summary().balanceSilver > 0" [class.text-red-500]="summary().balanceSilver < 0">
                    {{summary().balanceSilver}}
                </span>
                <div class="grid grid-cols-[min-content_1fr] gap-4">
                    <span class="text-base">Deposited:</span>
                    <span class="text-base">{{summary().depositedSilver}} worth of silver ({{summary().depositedEntries}} entries)</span>
                    <span class="text-base">Withdrawn:</span>
                    <span class="text-base">{{summary().withdrawnSilver}} worth of silver ({{summary().craftEntries}} entries)</span>
                </div>
            </div>
        </mat-card-content>
    </mat-card>
    <mat-card class="col-span-2">
        <mat-card-header class="text-xl">Balance analytics</mat-card-header>
        <mat-card-content class="h-36! py-2!">
            <canvas #balanceChart></canvas>
        </mat-card-content>
        <mat-card-actions class="gap-4">
            <button matButton="outlined" (click)="updatePeriod('day')">Day</button>
            <button matButton="outlined" (click)="updatePeriod('week')">Week</button>
            <button matButton="outlined" (click)="updatePeriod('month')">Month</button>
        </mat-card-actions>
    </mat-card>
</div>
