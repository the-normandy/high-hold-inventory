<div class="grid grid-cols-3 gap-10">
    <mat-card>
        <mat-card-header class="text-xl">Balance</mat-card-header>
        <mat-card-content>
            <div class="flex flex-col gap-2">
            <span class="text-4xl self-center justify-self-center py-2" [class.text-green-500]="summary().balanceSilver > 0" [class.text-red-500]="summary().balanceSilver < 0">
                {{summary().balanceSilver}}
            </span>
            <span class="text-base">Deposited {{summary().depositedSilver}} worth of silver</span>
            <span class="text-base">Withdrew {{summary().withdrawnSilver}} worth of silver</span>
            </div>
        </mat-card-content>
    </mat-card>
    <mat-card>
        <mat-card-header class="text-xl">Entries</mat-card-header>
        <mat-card-content>
            <!-- Chart goes here -->
        </mat-card-content>
    </mat-card>
    <mat-card>
        <mat-card-header class="text-xl">Sources</mat-card-header>
        <mat-card-content>
            <!-- Chart goes here -->
        </mat-card-content>
    </mat-card>
</div>
