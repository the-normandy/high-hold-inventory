<h2 mat-dialog-title>{{ record().timestamp | date: 'yyyy-MM-dd' }} {{record().entry}} of {{record().source}}</h2>
<mat-dialog-content>
    <div class="grid grid-cols-4">
        <span class="text-lg font-medium">Name</span>
        <span class="text-lg font-medium">Category</span>
        <span class="text-lg font-medium">Quantity</span>
        <span class="text-lg font-medium">Total Value</span>
        @for (item of record().items; track item.name) {
        <span>{{item.name}}</span>
        <span>{{item.category}}</span>
        <span>{{item.quantity}}</span>
        <span>{{item.value}}</span>
        }
    </div>
</mat-dialog-content>
<mat-dialog-actions>
    <button matButton="filled" class="w-24" (click)="copy()">Copy to Clipboard</button>
    <button matButton="tonal" class="w-24" mat-dialog-close>Close</button>
</mat-dialog-actions>
