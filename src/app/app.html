<mat-toolbar>
<a routerLink="" class="flex flex-row gap-4 items-center justify-center">
    <img src="/logo.png" alt="logo" height="80" />
    <span>{{title()}}</span>
</a>
<span class="ml-auto flex flex-row items-center justify-items-center gap-10">
    <span class="flex flex-row gap-4">
    <button matIconButton matTooltip="Color themes" [matMenuTriggerFor]="menu"><mat-icon>color_lens</mat-icon></button>
    <mat-menu #menu="matMenu" xPosition="before" class="rounded-md! w-36">
        <button mat-menu-item (click)="mode.accent.set('default')" class="rounded-md"><mat-icon>{{ mode.isAccentTheme('default') ? 'check' : 'star' }}</mat-icon> Azure</button>
        <button mat-menu-item (click)="mode.accent.set('summer')" class="rounded-md"><mat-icon>{{ mode.isAccentTheme('summer') ? 'check' : 'brightness_5' }}</mat-icon>Summer</button>
        <button mat-menu-item (click)="mode.accent.set('spring')" class="rounded-md"><mat-icon>{{ mode.isAccentTheme('spring') ? 'check' : 'local_florist' }}</mat-icon>Spring</button>
        <button mat-menu-item (click)="mode.accent.set('autumn')" class="rounded-md"><mat-icon>{{ mode.isAccentTheme('autumn') ? 'check' : 'grass' }}</mat-icon>Autumn</button>
        <button mat-menu-item (click)="mode.accent.set('winter')" class="rounded-md"><mat-icon>{{ mode.isAccentTheme('winter') ? 'check' : 'ac_unit' }}</mat-icon>Winter</button>
    </mat-menu>
    <button matIconButton (click)="openDataFolder()" matTooltip="Open app folder"><mat-icon>folder_open</mat-icon></button>
    </span>
    <span class="flex flex-row items-center justify-items-center gap-2!">
        <mat-icon>light_mode</mat-icon>
        <mat-slide-toggle (change)="themeChange()" [checked]="getSliderPosition()"></mat-slide-toggle>
        <mat-icon>dark_mode</mat-icon>
    </span> 
</span> 
</mat-toolbar>
<main class="flex flex-col flex-1 px-10">
    <div class="flex flex-row flex-1">
        <router-outlet />
    </div>
@if (dataError() !== null) {
    <div class="self-center flex flex-row gap-8 p-6 mt-10 border border-red-500 bg-red-800/10 text-red-500 rounded-md items-center">
        <mat-icon>cancel</mat-icon>
        <span>{{dataError()}}</span>
        <button matButton="tonal" (click)="retryLoadData()">Retry</button>
        <button matButton="tonal" (click)="openDataFolder()">Open folder</button>
    </div>
}
</main>
