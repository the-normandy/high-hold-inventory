<mat-toolbar>
<a routerLink="" class="flex flex-row gap-4 items-center justify-center">
    <img src="/logo.png" alt="logo" height="80" />
    <span>{{title()}}</span>
</a>
<span class="ml-auto px-4 flex flex-row items-center justify-items-center gap-2">
    <mat-icon>light_mode</mat-icon>
    <mat-slide-toggle (change)="themeChange()" [checked]="getSliderPosition()"></mat-slide-toggle>
    <mat-icon>dark_mode</mat-icon>
</span>
</mat-toolbar>
<main class="flex flex-1 px-10">
<router-outlet />
@if (dataError() !== null) {
    <div class="self-center flex flex-row gap-8 p-6 mt-10 border border-red-500 bg-red-800/10 text-red-500 rounded-md items-center">
        <mat-icon>cancel</mat-icon>
        <span>{{dataError()}}</span>
        <button matButton="tonal" (click)="retryLoadData()">Retry</button>
        <button matButton="tonal" (click)="openDataFolder()">Open folder</button>
    </div>
}
</main>
