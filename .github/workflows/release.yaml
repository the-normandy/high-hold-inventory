name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build frontend + Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build

      - name: Generate latest.json
        shell: pwsh
        run: |
          $installer = Get-ChildItem "src-tauri/target/release/bundle/nsis/*.exe" | Select-Object -First 1
          $sigFile = Get-ChildItem "src-tauri/target/release/bundle/nsis/*.exe.sig" | Select-Object -First 1

          $sig = Get-Content $sigFile.FullName -Raw
          $sig = $sig.Trim()

          $version = "${{ github.ref_name }}".TrimStart("v")

          $json = @{
            version = $version
            notes = ""
            pub_date = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
            platforms = @{
              "windows-x86_64" = @{
                signature = $sig
                url = "https://github.com/the-normandy/high-hold-inventory/releases/download/${{ github.ref_name }}/$($installer.Name -replace ' ', '.')"
              }
            }
          } | ConvertTo-Json -Depth 10

          $json | Out-File "src-tauri/target/release/bundle/nsis/latest.json" -Encoding utf8

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/nsis/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}